name: release

# Publishes @keeperhub/sdk to npm using trusted publishing (OIDC) — no NPM_TOKEN.
# Triggered by pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
#
# ONE-TIME SETUP (npm cannot trust a package that doesn't exist yet):
#   1. Publish v1 manually once from a local checkout: `npm publish` (as a keeperhub org member).
#   2. On npmjs.com: package @keeperhub/sdk -> Settings -> Trusted Publisher ->
#      GitHub Actions, org "KeeperHub", repo "sdk", workflow file "release.yml".
#   After that, every `v*` tag publishes from CI with automatic provenance.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest # OIDC requires npm >= 11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm run test --if-present
      - name: Publish to npm
        run: npm publish # no token, no --provenance: both handled by trusted publishing
